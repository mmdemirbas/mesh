version: '3'

tasks:
  default:
    cmds:
      - task --list

  build:
    desc: Build the native mesh CLI for local execution
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo dev
      LDFLAGS: -X main.version={{.VERSION}}
    cmds:
      - go build -o build/mesh{{exeExt}} -ldflags '{{.LDFLAGS}}' -buildvcs=false ./cmd/mesh/

  build:linux:
    desc: Build mesh for linux/amd64 into e2e/build (consumed by the e2e image)
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo dev
      LDFLAGS: -s -w -X main.version={{.VERSION}}
    sources:
      - cmd/mesh/**/*.go
      - internal/**/*.go
      - go.mod
      - go.sum
    generates:
      - e2e/build/mesh-linux-amd64
    cmds:
      - mkdir -p e2e/build
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags '{{.LDFLAGS}}' -buildvcs=false -o e2e/build/mesh-linux-amd64 ./cmd/mesh/

  build:stub-linux:
    desc: Build the e2e stub-llm binary for linux/amd64 (used by the gateway scenario)
    sources:
      - e2e/stub/**/*.go
    generates:
      - e2e/build/stub-linux-amd64
    cmds:
      - mkdir -p e2e/build
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags e2e -buildvcs=false -o e2e/build/stub-linux-amd64 ./e2e/stub

  build:e2e-image:
    desc: Build the mesh-e2e:local image used by the scenario suite (rebuilds only when content changes)
    deps: [build:linux, build:stub-linux]
    sources:
      - e2e/build/mesh-linux-amd64
      - e2e/build/stub-linux-amd64
      - e2e/Dockerfile.e2e
      - e2e/fixtures/fake-xclip
    generates:
      - e2e/build/.image-hash
    cmds:
      - docker build -f e2e/Dockerfile.e2e -t mesh-e2e:local e2e
      - sh -c 'cat e2e/build/mesh-linux-amd64 e2e/build/stub-linux-amd64 e2e/Dockerfile.e2e e2e/fixtures/fake-xclip | shasum -a 256 | cut -d" " -f1 > e2e/build/.image-hash'

  dist:
    desc: Build cross-platform release binaries (outputs to dist/)
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo dev
      LDFLAGS: -s -w -X main.version={{.VERSION}}
    cmds:
      # CGO_ENABLED Omitted: Auto-detects 1 on Mac (optimized) and 0 on Windows (safe fallback).
      - GOOS=darwin GOARCH=arm64 go build -ldflags '{{.LDFLAGS}}' -buildvcs=false -o dist/mesh-darwin-arm64 ./cmd/mesh/
      # CGO_ENABLED=0: Guarantees 100% static linking, preventing glibc dependency issues.
      - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags '{{.LDFLAGS}}' -buildvcs=false -o dist/mesh-linux-arm64 ./cmd/mesh/
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags '{{.LDFLAGS}}' -buildvcs=false -o dist/mesh-linux-amd64 ./cmd/mesh/
      - CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags '{{.LDFLAGS}}' -buildvcs=false -o dist/mesh-windows-amd64.exe ./cmd/mesh/

  schema:
    desc: Regenerate JSON schema from config structs
    cmds:
      - cd cmd/schema-gen && go run . > ../../configs/mesh.schema.json

  proto:
    desc: Regenerate protobuf Go code
    cmds:
      - protoc --go_out=. --go_opt=paths=source_relative internal/filesync/proto/filesync.proto

  test:
    desc: "Run all tests"
    cmds:
      - go test -count=1 ./...

  test:v:
    desc: "Run all tests with verbose output"
    cmds:
      - go test -v ./...

  bench:
    desc: Run all benchmarks
    cmds:
      - go test -bench=. -benchmem ./...

  lint:
    desc: Run linters
    cmds:
      - go vet ./...
      - golangci-lint run 2>/dev/null || echo "golangci-lint not installed, skipping (go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest)"

  check:
    desc: "Pre-release quality gate: vet, staticcheck, fmt, tidy, race tests, build, e2e (FAST=1 skips e2e)"
    cmds:
      - go vet ./...
      - staticcheck ./...
      - cmd: |
          test -z "$(gofmt -l .)" || { gofmt -l .; echo "gofmt: files above need formatting"; exit 1; }
      - go mod tidy -diff
      - go test -race -count=1 ./...
      - task: build
      - cmd: |
          if [ "${FAST:-}" = "1" ]; then
            echo "FAST=1: skipping e2e gate (run task e2e to exercise it)"
          else
            task e2e
          fi

  e2e:
    desc: "Run the end-to-end scenario suite against real containers (requires docker)"
    deps: [build:e2e-image]
    cmds:
      - go test -race -count=1 -tags e2e -timeout 15m ./e2e/...

  e2e:churn:
    desc: "Run the heavy filesync churn suite (tag e2e_churn, nightly-grade)"
    deps: [build:e2e-image]
    cmds:
      - go test -count=1 -tags e2e_churn -timeout 20m ./e2e/churn/...

  e2e:full:
    desc: "Run both the scenario suite and the churn suite"
    cmds:
      - task: e2e
      - task: e2e:churn

  e2e:compose:up:
    desc: "Start the e2e compose playground (all four features in one topology)"
    deps: [build:e2e-image]
    cmds:
      - docker compose -f e2e/compose/docker-compose.yaml --project-directory e2e/compose up -d

  e2e:compose:down:
    desc: "Tear down the e2e compose playground"
    cmds:
      - docker compose -f e2e/compose/docker-compose.yaml --project-directory e2e/compose down -v

  release:
    desc: "Run quality gate, then tag and push a release (usage: task release [-- major|minor|patch])"
    preconditions:
      - sh: 'echo "{{.CLI_ARGS | default "patch"}}" | grep -qxE "major|minor|patch"'
        msg: "Argument must be one of: major, minor, patch"
      - sh: "test -z \"$(git status --porcelain)\""
        msg: "Working tree is dirty — commit or stash changes first"
    vars:
      BUMP: '{{.CLI_ARGS | default "patch"}}'
      LATEST:
        sh: "git tag -l 'v*' --sort=-v:refname | head -1 | sed 's/^v//' | grep . || echo '0.0.0'"
      MAJOR:
        sh: "echo '{{.LATEST}}' | cut -d. -f1"
      MINOR:
        sh: "echo '{{.LATEST}}' | cut -d. -f2"
      PATCH:
        sh: "echo '{{.LATEST}}' | cut -d. -f3"
      VERSION:
        sh: |
          case '{{.BUMP}}' in
            major) echo "v$(({{.MAJOR}}+1)).0.0" ;;
            minor) echo "v{{.MAJOR}}.$(({{.MINOR}}+1)).0" ;;
            patch) echo "v{{.MAJOR}}.{{.MINOR}}.$(({{.PATCH}}+1))" ;;
          esac
    cmds:
      - "echo 'Releasing {{.VERSION}} ({{.BUMP}} bump from v{{.LATEST}})'"
      - task: check
      - git tag {{.VERSION}}
      - git push origin {{.VERSION}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf build/ dist/

  setup:windows:
    desc: Add the build directory to Windows PATH
    platforms: [ windows ]
    cmds:
      - powershell -NoProfile -Command '$d="{{.USER_WORKING_DIR}}\build"; $p=[Environment]::GetEnvironmentVariable("PATH","User"); if(($p -split ";") -notcontains $d) { [Environment]::SetEnvironmentVariable("PATH", "$p;$d", "User"); Write-Host "Added $d to PATH" }'

  setup:unix:
    desc: Add the build directory to Unix PATH (macOS/Linux)
    platforms: [ darwin, linux ]
    cmds:
      - |
        PROFILE=$([ "$(basename "$SHELL")" = "zsh" ] && echo "$HOME/.zshrc" || echo "$HOME/.bashrc")
        grep -qxF 'export PATH="$PATH:{{.USER_WORKING_DIR}}/build"' "$PROFILE" || echo 'export PATH="$PATH:{{.USER_WORKING_DIR}}/build"' >> "$PROFILE"
        echo "Setup complete. Restart your terminal."