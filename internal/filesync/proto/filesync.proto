syntax = "proto3";
package filesync;
option go_package = "github.com/mmdemirbas/mesh/internal/filesync/proto";

// IndexExchange is sent during sync: each side pushes its index and receives
// the peer's index in the response.
message IndexExchange {
  string device_id = 1;
  string folder_id = 2;
  int64  sequence  = 3;            // Highest sequence number in this index
  repeated FileInfo files = 4;
  int64  since     = 5;            // Only include entries with sequence > since (delta mode)
  int32  page        = 6;          // 0-based page number
  int32  total_pages = 7;          // Total pages (0 or 1 = single page, legacy compat)
  bool   fetch       = 8;          // True = client is fetching a server response page
  string epoch       = 9;          // Random ID regenerated on index creation; used to detect index loss
  uint32 protocol_version = 10;    // Filesync wire protocol version. Current: 1. Mismatches are rejected.
}

// FileInfo describes a single file (or a deletion tombstone) in the index.
message FileInfo {
  string path      = 1;           // Relative to folder root, forward-slash separated
  int64  size      = 2;
  int64  mtime_ns  = 3;           // Unix nanoseconds
  bytes  sha256    = 4;           // 32 bytes
  bool   deleted   = 5;           // Tombstone flag
  int64  sequence  = 6;           // Per-device ordering only (delta shortcut). Conflict semantics live in version.
  uint32 mode      = 7;           // Unix permission bits (e.g., 0644)
  // prev_path is a single-use rename hint (R1 Phase 2). Set by the sender
  // when it detects that a new path has the same filesystem inode as a
  // tombstoned entry; the receiver uses it to apply a local rename (plus
  // optional /delta against the old content) instead of a full re-download.
  // Empty when no rename was detected. Peers that do not understand this
  // field ignore it and download normally (safe fallback via proto3
  // unknown-field tolerance).
  string prev_path = 8;
  // C6: per-file vector clock. Each Counter carries a device_id (10-char
  // Crockford base32) and the number of local writes observed on that
  // device. Conflict detection compares vectors by strict domination.
  repeated Counter version = 9;
}

// Counter is a single entry in a vector clock: how many writes device_id
// has observed for a given file. See docs/filesync/DESIGN-v1.md §1.
message Counter {
  string device_id = 1;           // 10-char Crockford base32
  uint64 value     = 2;
}

// BundleRequest lists file paths to download in a single round-trip (P19).
// Response is a tar+gzip stream; files absent from the tar are retried individually.
message BundleRequest {
  string folder_id     = 1;
  repeated string paths = 2;
}

// BlockSignatures is sent by the receiver to request a block-level delta.
// Each entry is the SHA-256 hash of a fixed-size block of the local file.
message BlockSignatures {
  string folder_id  = 1;
  string path       = 2;
  int64  block_size = 3;           // Block size in bytes (e.g., 131072 = 128 KB)
  int64  file_size  = 4;           // Total local file size
  repeated bytes block_hashes = 5; // SHA-256 of each sequential block
}

// DeltaResponse contains only the blocks that differ between the local
// and remote versions of a file.
message DeltaResponse {
  int64  file_size    = 1;         // Total remote file size
  bytes  file_sha256  = 2;         // Deprecated (L7): receiver verifies hash independently. Kept for wire compat.
  repeated DeltaBlock blocks = 3;
}

// DeltaBlock carries a single changed block.
message DeltaBlock {
  int64 index = 1;                 // Block index (0-based)
  bytes data  = 2;                 // Block content
}
