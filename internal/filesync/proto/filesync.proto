syntax = "proto3";
package filesync;
option go_package = "github.com/mmdemirbas/mesh/internal/filesync/proto";

// IndexExchange is sent during sync: each side pushes its index and receives
// the peer's index in the response.
message IndexExchange {
  string device_id = 1;
  string folder_id = 2;
  int64  sequence  = 3;            // Highest sequence number in this index
  repeated FileInfo files = 4;
  int64  since     = 5;            // Only include entries with sequence > since (delta mode)
  int32  page        = 6;          // 0-based page number
  int32  total_pages = 7;          // Total pages (0 or 1 = single page, legacy compat)
  bool   fetch       = 8;          // True = client is fetching a server response page
  string epoch       = 9;          // Random ID regenerated on index creation; used to detect index loss
}

// FileInfo describes a single file (or a deletion tombstone) in the index.
message FileInfo {
  string path      = 1;           // Relative to folder root, forward-slash separated
  int64  size      = 2;
  int64  mtime_ns  = 3;           // Unix nanoseconds
  bytes  sha256    = 4;           // 32 bytes
  bool   deleted   = 5;           // Tombstone flag
  int64  sequence  = 6;           // Per-file monotonic counter
}

// BlockSignatures is sent by the receiver to request a block-level delta.
// Each entry is the SHA-256 hash of a fixed-size block of the local file.
message BlockSignatures {
  string folder_id  = 1;
  string path       = 2;
  int64  block_size = 3;           // Block size in bytes (e.g., 131072 = 128 KB)
  int64  file_size  = 4;           // Total local file size
  repeated bytes block_hashes = 5; // SHA-256 of each sequential block
}

// DeltaResponse contains only the blocks that differ between the local
// and remote versions of a file.
message DeltaResponse {
  int64  file_size    = 1;         // Total remote file size
  bytes  file_sha256  = 2;         // SHA-256 of the complete remote file
  repeated DeltaBlock blocks = 3;
}

// DeltaBlock carries a single changed block.
message DeltaBlock {
  int64 index = 1;                 // Block index (0-based)
  bytes data  = 2;                 // Block content
}
