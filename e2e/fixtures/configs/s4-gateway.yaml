gw:
  log_level: info
  admin_addr: "127.0.0.1:7777"
  gateway:
    - name: a2o-happy
      client:
        - bind: "127.0.0.1:3101"
          api: anthropic
      routing:
        - upstream_name: stub
          client_model: ["*"]
      upstream:
        - name: stub
          target: http://STUB_IP:8080/openai/happy
          api: openai
          api_key_env: STUB_KEY

    - name: o2a-happy
