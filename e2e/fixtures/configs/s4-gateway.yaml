      bind: "127.0.0.1:3101"
      client_api: anthropic
      upstream_api: openai
      upstream: http://STUB_IP:8080/openai/happy
      api_key_env: STUB_KEY

    - name: o2a-happy
      bind: "127.0.0.1:3102"
