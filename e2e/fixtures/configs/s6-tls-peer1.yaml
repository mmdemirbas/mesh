peer1:
  log_level: info
  admin_addr: "127.0.0.1:7777"
  filesync:
    - bind: "0.0.0.0:7756"
      scan_interval: "2s"
      max_concurrent: 2
      peers:
        peer2:
          addresses: ["PEER2_IP:7756"]
          tls_fingerprint: "{{.PeerFingerprint}}"
      defaults:
        peers: ["peer2"]
        direction: send-receive
      folders:
        shared:
          path: /root/sync
