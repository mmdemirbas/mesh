ignore2:
  log_level: info
  admin_addr: "127.0.0.1:7777"
  filesync:
    - bind: "0.0.0.0:7756"
      scan_interval: "2s"
      max_concurrent: 2
      peers:
        ignore1: ["IGNORE1_IP:7756"]
      defaults:
        peers: ["ignore1"]
        direction: send-receive
        ignore_patterns:
          - "*.log"
          - ".git"
          - "build/"
      folders:
        shared:
          path: /root/sync
