version: "2"

linters:
  default: none
  enable:
    # Correctness
    - errcheck      # unchecked errors
    - govet         # go vet
    - staticcheck   # semantic analysis (SA*, S*, ST*, QF*)
    # Security
    - gosec         # OWASP-aligned security checks
    # Quality
    - gocritic      # style and correctness patterns
    - unused        # unused code

  settings:
    gosec:
      excludes:
        - G112  # ReadHeaderTimeout — not relevant for local-only admin server
        - G115  # integer overflow on conversion — too noisy for systems code
        - G118  # goroutine with background context — intentional for long-running handlers
        - G122  # filepath.Walk TOCTOU — acceptable for cleanup of temp files
        - G304  # file inclusion via variable — paths are validated at call sites
        - G704  # SSRF via taint analysis — URLs are from config, not user input
        - G706  # log injection — logged values are peer addresses, not user input

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
