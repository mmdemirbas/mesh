# yaml-language-server: $schema=mesh.schema.json
# (Remote option: # yaml-language-server: $schema=https://raw.githubusercontent.com/mmdemirbas/mesh/main/configs/mesh.schema.json)

# ==============================================================================
# Common Options (YAML Anchors)
# ==============================================================================
# Define common SSH/SSHD options once and reuse them across different configurations.
# These map closely to standard OpenSSH client/server configurations.

# https://manpages.ubuntu.com/manpages/plucky/en/man5/ssh_config.5.html
x-ssh-options: &ssh_options
  KexAlgorithms: "curve25519-sha256@libssh.org"
  Ciphers: "chacha20-poly1305@openssh.com,aes128-gcm@openssh.com"
  MACs: "umac-64-etm@openssh.com,hmac-sha2-256-etm@openssh.com"
  ConnectTimeout: "15"
  TCPKeepAlive: "yes"

# https://manpages.ubuntu.com/manpages/plucky/en/man5/sshd_config.5.html
x-sshd-options: &sshd_options
  <<: *ssh_options
  ClientAliveInterval: "15"
  ClientAliveCountMax: "3"

# ==============================================================================
# Services
# ==============================================================================

my-vps-tunnel-service:
  # Log verbosity: "debug", "info" (default), "warn", or "error".
  log_level: info

  # Admin server listen address for the local HTTP API and web UI.
  # Endpoints: /ui (dashboard), /ui/filesync, /api/state, /api/logs, /api/metrics.
  # Default: "127.0.0.1:7777" (localhost only).
  # Set to "off" to disable entirely.
  admin_addr: "127.0.0.1:7777"

  # ==============================================================================
  # 1. Clipboard Synchronization
  # ==============================================================================
  # Seamlessly sync copied text, images, and files across all your mesh peers.
  # By default, clipsync uses UDP broadcasts to automatically discover other mesh
  # nodes on your local network. It bypasses OS firewalls (like Windows) by having
  # the receiving node proactively pull the payload via HTTP.
  clipsync:
    # 'bind': The network interface and TCP port for the HTTP pull server.
    # "0.0.0.0:7755" allows incoming pulls from any peer.
    - bind: "0.0.0.0:7755"

      # LAN discovery group names. Peers with overlapping groups discover each other
      # via UDP broadcast on port 7755. Empty list disables dynamic discovery.
      lan_discovery_group: ["default"]

      # 'static_peers': Explicitly define peer addresses (IP:PORT) to sync with.
      # This is highly useful for syncing across VLANs, VPNs, or the internet where
      # UDP broadcast discovery is dropped. These peers are synced with unconditionally.
      static_peers:
        - "192.168.1.100:7755"
        - "10.0.0.5:7755"

      # How often to poll the OS clipboard for changes. Default: "3s".
      # Lower values detect changes faster but spawn more subprocess calls.
      # poll_interval: "3s"

  # ==============================================================================
  # 2. File Synchronization
  # ==============================================================================
  # Sync folders between mesh nodes. Named peers for readability.
  # Uses protobuf for efficient index exchange and supports resume for large files.
  # Real-time change detection via fsnotify, with periodic full scan as safety net.
  filesync:
    - bind: "0.0.0.0:7756"
      scan_interval: "60s"   # Full rescan interval (fsnotify handles real-time)
      max_concurrent: 4      # Concurrent file transfers
      # max_bandwidth: "50MB"  # Throttle to 50 MB/s (default: unlimited)

      # Named peer definitions. Key is a short nickname.
      # Note: peer state is keyed by IP. If you replace hardware at the same
      # IP, delete ~/.mesh/filesync/<folder>/peers.yaml on the other side
      # to avoid stale sequence numbers causing missed updates.
      peers:
        desktop: ["192.168.1.10:7756"]
        laptop:  ["127.0.0.1:17756"]    # Behind NAT via SSH tunnel

      # Default values applied to all folders unless overridden per-folder.
      defaults:
        peers: ["desktop"]
        direction: send-receive          # send-receive | send-only | receive-only | dry-run | disabled
        # Note: receive-only applies remote deletes (files deleted on sender
        # are deleted locally). Use snapshots/versioning for deletion protection.
        ignore_patterns:                 # Gitignore-style, applied to all folders
          - ".git"
          - "node_modules"
          - "*.tmp"

      # Folders to sync. Key is a human-readable ID (must match on all peers).
      folders:
        projects:
          path: ~/Projects
          peers: ["desktop", "laptop"]   # Overrides defaults.peers

        photos-backup:
          path: ~/Photos
          direction: send-only           # One-way backup

  # ==============================================================================
  # 3. LLM API Gateway (translation + transparent passthrough with audit logging)
  # ==============================================================================
  # Each gateway instance listens on a local port, forwards requests to an
  # upstream LLM API, and returns the response. The (client_api, upstream_api)
  # pair selects one of four directions:
  #   - anthropic -> openai  (translate): Claude Code against OpenAI backends
  #   - openai    -> anthropic (translate): OpenAI-only tools against Claude
  #   - anthropic -> anthropic (passthrough): log every Claude Code request
  #   - openai    -> openai    (passthrough): log every OpenAI-style request
  # When api_key_env is unset, the gateway preserves client auth headers
  # verbatim (needed for OAuth-authenticated clients).
  gateway:
    # Claude Code -> non-Anthropic backend (e.g., OneAPI, Ollama, vLLM)
    - name: claude-to-oneapi
      bind: "127.0.0.1:3457"
      upstream: https://oneapi.example.com/v1/chat/completions
      upstream_api: openai
      client_api: anthropic
      api_key_env: ONEAPI_KEY         # env var name, never a literal key
      # proxy: socks5://127.0.0.1:1081  # optional outbound proxy
      timeout: 600s
      default_max_tokens: 32768       # used when client omits max_tokens
      # response_model: internal-glm  # optional: replace the model name in
                                      #           every client-facing response
                                      #           with this string. Lets the
                                      #           operator distinguish two
                                      #           Claude Code sessions
                                      #           (one direct, one via mesh)
                                      #           at a glance in the UI.
      model_map:                      # supports exact, glob (*, ?, [...]), and "*" catch-all
        claude-opus-4-6: glm-4.7     # exact match (highest priority)
        claude-sonnet-*: glm-4.7     # glob pattern (longer patterns match first)
        # "*": glm-4.7              # catch-all default (lowest priority)

    # OpenAI-only tools (Cursor, Aider) -> Anthropic
    - name: claude-for-cursor
      bind: "127.0.0.1:3458"
      upstream: https://api.anthropic.com/v1/messages
      upstream_api: anthropic
      client_api: openai
      api_key_env: ANTHROPIC_API_KEY
      timeout: 600s
      default_max_tokens: 32768
      model_map:
        gpt-*: claude-sonnet-4-6     # glob: all gpt models -> claude

    # Transparent passthrough: Claude Code against Anthropic with full audit log.
    # api_key_env omitted so Claude Code's OAuth auth is forwarded verbatim.
    - name: claude-passthrough-audit
      bind: "127.0.0.1:3459"
      upstream: https://api.anthropic.com
      upstream_api: anthropic
      client_api: anthropic
      timeout: 600s
      log:
        level: full                   # off | metadata | full   (default: metadata)
        # dir: ~/.mesh/gateway        # default
        # max_file_size: 100MB        # default
        # max_age: 30d                # default; accepts Nd / Nw / stdlib duration

  # ==============================================================================
  # 4. Listeners (Accept incoming connections and requests)
  # ==============================================================================
  listeners:
    # 'proxies': Run standard exit nodes on THIS machine.
    # SOCKS5 Proxy
    - { type: socks, bind: "127.0.0.1:1080" }
    # HTTP Proxy (Optional: forward traffic through an upstream SOCKS proxy)
    - { type: http,  bind: "127.0.0.1:1081", target: "127.0.0.1:1080" }

    # 'relays': Simple TCP port forwarding from a local port to a remote IP:PORT.
    # Directly replaces `socat` setups.
    - { type: relay, bind: "0.0.0.0:4444", target: "192.168.1.50:80" }

    # 'servers': Act as an SSH daemon. You can define multiple listeners.
    - type: sshd
      bind: "0.0.0.0:2222"
      # The host key identifying this server to clients
      host_key: ~/.ssh/keys/server/key
      # The public keys allowed to log in
      authorized_keys: ~/.ssh/keys/server/authorized_keys
      # The shell to execute when a client requests an interactive session (PTY).
      shell: [ "bash", "-l" ]
      # Apply common SSHD options
      options: *sshd_options

  # ==============================================================================
  # 5. Outbound SSH Connections (Dial remote servers)
  # ==============================================================================
  # Act as an SSH client. You can define multiple outbound connections.
  #
  # Two connection modes are available:
  #   failover (default): Tries targets in order until one succeeds. Best for HA setups.
  #   multiplex:          Connects to ALL targets simultaneously. Best for managing fleets.
  connections:

    # --- Failover Connection (default mode) ---
    # Tries targets in order; falls back to the next if one is unreachable.
    - name: my-vps-tunnel
      mode: failover  # default; can be omitted

      # 'targets': A list of fallback URLs to try dialing in order.
      # Unreachable targets fail fast (3s probe timeout). .local mDNS addresses get one automatic retry.
      targets:
        - ubuntu@my-vps.local:22  # Try mDNS first
        - ubuntu@12.34.56.78:22   # Fallback to public IP

      # How long to wait before attempting to reconnect if the session drops.
      retry: 10s

      # Authentication credentials for the target server(s).
      # Multiple methods can be configured; tried in order: agent → key → password_command.
      auth:
        # Use the SSH agent for key-based auth (most secure — keys never leave the agent).
        # Requires SSH_AUTH_SOCK to be set.
        # agent: true

        # Path to a private key file.
        key: ~/.ssh/keys/client/key

        # Shell command whose stdout is used as the password.
        # The password never appears in the config file.
        # Examples:
        #   password_command: "security find-generic-password -s mesh -w"  # macOS Keychain
        #   password_command: "pass show mesh/server"                      # pass/gpg
        #   password_command: "op read op://vault/ssh/password"            # 1Password CLI

        # Path to known_hosts file for server verification.
        known_hosts: ~/.ssh/keys/client/known_hosts

      # Common SSH options applied to all forwards in this connection.
      options: *ssh_options

      # --------------------------------------------------------------------------
      # Forwarding Sets (Parallel SSH Sessions)
      # --------------------------------------------------------------------------
      # 'forwards' is a list of sets. Each set establishes its own purely
      # independent physical SSH connection beneath the hood.
      # This maximizes throughput and prevents head-of-line blocking across tasks.
      forwards:

        # --- Set A: Port Forwarding (-L / -R) ---
        - name: port-mappings
          # 'options' overrides or adds to connection-level options (e.g., QoS diffserv)
          options: { IPQoS: "lowdelay throughput" }

          # 'local' (-L equivalent): Listen locally (8080), forward traffic TO the peer (80).
          local:
            - { type: forward, bind: "127.0.0.1:8080", target: "127.0.0.1:80" }

          # 'remote' (-R equivalent): Listen on the peer (9090), forward traffic BACK HERE (22).
          remote:
            - { type: forward, bind: "0.0.0.0:9090", target: "127.0.0.1:22" }

        # --- Set B: Dynamic Proxies (-D / Remote -D) ---
        - name: remote-proxy
          options: { IPQoS: "lowdelay throughput" }
          # 'local' (-D equivalent): Bind a SOCKS/HTTP proxy locally.
          # Traffic entering this proxy (2080/2081) exits out into the peer's network.
          local:
            - { type: socks, bind: "127.0.0.1:2080" }
            - { type: http,  bind: "127.0.0.1:2081", target: "127.0.0.1:2080" }

          # 'remote' (Reverse -D): Bind a SOCKS/HTTP proxy on the peer.
          # Traffic entering the peer's proxy (3080) exits out into YOUR local network.
          remote:
            - { type: socks, bind: "127.0.0.1:3080" }

    # --- Multiplex Connection (fleet management) ---
    # Connects to ALL targets simultaneously. Each target gets its own SSH connection.
    # Useful for managing server fleets. Replaces docker-compose setups with dozens of sshpass containers.
    # Without 'forwards', connections stay alive as keepalive tunnels.
    - name: cluster-30
      mode: multiplex
      targets:
        - root@192.168.13.30
        - root@192.168.13.66
        - root@192.168.13.106
        - root@192.168.13.124
      retry: 10s
      auth:
        # Password fetched from an external tool — never stored in this file.
        password_command: "pass show cluster30/ssh"
      options:
        StrictHostKeyChecking: "no"  # Lab/internal environment — insecure, disables host key verification
